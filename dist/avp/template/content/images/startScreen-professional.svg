<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F8EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8EDD0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28BE46;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E9E38;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="460" fill="url(#bgGrad)"/>

  <!-- Decorative elements -->
  <circle cx="200" cy="300" r="6" fill="#28BE46" opacity="0.2"/>
  <circle cx="820" cy="340" r="8" fill="#28BE46" opacity="0.15"/>
  <circle cx="170" cy="580" r="5" fill="#FFB600" opacity="0.2"/>
  <circle cx="840" cy="600" r="7" fill="#FFB600" opacity="0.15"/>
  <circle cx="260" cy="200" r="4" fill="#6573FF" opacity="0.15"/>
  <circle cx="760" cy="220" r="6" fill="#6573FF" opacity="0.12"/>

  <!-- Main book/document -->
  <g filter="url(#shadow1)">
    <!-- Open book base -->
    <path d="M260,300 Q512,330 512,330 Q512,330 764,300 L764,660 Q512,690 512,690 Q512,690 260,660 Z" fill="#fff"/>
    <!-- Book spine shadow -->
    <line x1="512" y1="330" x2="512" y2="690" stroke="#e0e0e0" stroke-width="2"/>
    <!-- Left page content -->
    <rect x="300" y="370" width="170" height="10" rx="5" fill="#333" opacity="0.5"/>
    <rect x="300" y="395" width="140" height="8" rx="4" fill="#999" opacity="0.3"/>
    <rect x="300" y="415" width="160" height="8" rx="4" fill="#999" opacity="0.3"/>
    <rect x="300" y="435" width="120" height="8" rx="4" fill="#999" opacity="0.3"/>
    <!-- Left page diagram -->
    <rect x="300" y="470" width="170" height="80" rx="8" fill="#E8F8EB"/>
    <circle cx="340" cy="510" r="20" fill="#28BE46" opacity="0.3"/>
    <circle cx="385" cy="510" r="20" fill="#28BE46" opacity="0.5"/>
    <circle cx="430" cy="510" r="20" fill="#28BE46" opacity="0.7"/>
    <!-- Arrow connecting circles -->
    <line x1="360" y1="510" x2="410" y2="510" stroke="#1E9E38" stroke-width="2"/>
    <!-- Left page more text -->
    <rect x="300" y="570" width="150" height="8" rx="4" fill="#999" opacity="0.3"/>
    <rect x="300" y="590" width="170" height="8" rx="4" fill="#999" opacity="0.3"/>
    <rect x="300" y="610" width="130" height="8" rx="4" fill="#999" opacity="0.3"/>

    <!-- Right page content -->
    <rect x="550" y="370" width="170" height="10" rx="5" fill="#333" opacity="0.5"/>
    <rect x="550" y="395" width="150" height="8" rx="4" fill="#999" opacity="0.3"/>
    <rect x="550" y="415" width="130" height="8" rx="4" fill="#999" opacity="0.3"/>
    <!-- Right page checklist -->
    <g>
      <rect x="550" y="450" width="18" height="18" rx="4" fill="#28BE46"/>
      <polyline points="555,460 559,465 565,454" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <rect x="578" y="454" width="120" height="8" rx="4" fill="#333" opacity="0.4"/>
    </g>
    <g>
      <rect x="550" y="482" width="18" height="18" rx="4" fill="#28BE46"/>
      <polyline points="555,492 559,497 565,486" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <rect x="578" y="486" width="140" height="8" rx="4" fill="#333" opacity="0.4"/>
    </g>
    <g>
      <rect x="550" y="514" width="18" height="18" rx="4" fill="#FFB600"/>
      <circle cx="559" cy="523" r="4" fill="#fff"/>
      <rect x="578" y="518" width="100" height="8" rx="4" fill="#333" opacity="0.4"/>
    </g>
    <g>
      <rect x="550" y="546" width="18" height="18" rx="4" fill="none" stroke="#ccc" stroke-width="1.5"/>
      <rect x="578" y="550" width="130" height="8" rx="4" fill="#333" opacity="0.2"/>
    </g>
    <!-- Right page progress -->
    <rect x="550" y="590" width="170" height="8" rx="4" fill="#E8F8EB"/>
    <rect x="550" y="590" width="95" height="8" rx="4" fill="url(#greenGrad)"/>
    <text x="655" y="597" font-family="Arial,sans-serif" font-size="9" fill="#28BE46" font-weight="600">56%</text>
  </g>

  <!-- Graduation cap floating top -->
  <g filter="url(#shadow2)" transform="translate(512, 220)">
    <rect x="-40" y="-25" width="80" height="50" rx="12" fill="#fff"/>
    <!-- Cap -->
    <polygon points="0,-12 25,0 0,8 -25,0" fill="url(#greenGrad)"/>
    <line x1="0" y1="8" x2="0" y2="-12" stroke="#1E9E38" stroke-width="2"/>
    <rect x="-2" y="-14" width="4" height="4" rx="2" fill="#1E9E38"/>
    <!-- Tassel -->
    <line x1="25" y1="0" x2="30" y2="12" stroke="#FFB600" stroke-width="2" stroke-linecap="round"/>
    <circle cx="30" cy="14" r="3" fill="#FFB600"/>
  </g>

  <!-- Lightbulb floating right -->
  <g filter="url(#shadow2)" transform="translate(780, 440)">
    <rect x="-35" y="-35" width="70" height="70" rx="12" fill="#fff"/>
    <!-- Bulb -->
    <path d="M0,-18 Q18,-18 18,0 Q18,10 8,14 L8,20 L-8,20 L-8,14 Q-18,10 -18,0 Q-18,-18 0,-18" fill="url(#greenGrad)" opacity="0.8"/>
    <rect x="-6" y="20" width="12" height="4" rx="2" fill="#1E9E38"/>
    <!-- Light rays -->
    <line x1="0" y1="-26" x2="0" y2="-22" stroke="#FFB600" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="0" x2="26" y2="0" stroke="#FFB600" stroke-width="2" stroke-linecap="round"/>
    <line x1="-22" y1="0" x2="-26" y2="0" stroke="#FFB600" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="-16" x2="19" y2="-19" stroke="#FFB600" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16" y1="-16" x2="-19" y2="-19" stroke="#FFB600" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Pencil floating left -->
  <g filter="url(#shadow2)" transform="translate(210, 430)">
    <rect x="-35" y="-35" width="70" height="70" rx="12" fill="#fff"/>
    <!-- Pencil body -->
    <g transform="rotate(-45)">
      <rect x="-4" y="-22" width="8" height="30" fill="#FFB600"/>
      <rect x="-4" y="-22" width="8" height="6" fill="#1a3a2a" opacity="0.6"/>
      <polygon points="-4,8 4,8 0,16" fill="#F5D6B0"/>
      <circle cx="0" cy="15" r="1.5" fill="#333"/>
    </g>
  </g>

  <!-- TPU brand accent bar at bottom -->
  <rect x="362" y="740" width="300" height="6" rx="3" fill="url(#greenGrad)" opacity="0.4"/>
</svg>