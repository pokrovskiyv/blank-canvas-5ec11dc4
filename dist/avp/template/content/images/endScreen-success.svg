<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F8EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D0F0D8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28BE46;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E9E38;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFB600;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="512" cy="512" r="460" fill="url(#bgGrad)"/>

  <!-- Confetti -->
  <rect x="220" y="270" width="10" height="4" rx="2" fill="#28BE46" opacity="0.4" transform="rotate(-25 225 272)"/>
  <rect x="780" y="300" width="12" height="4" rx="2" fill="#FF4460" opacity="0.4" transform="rotate(30 786 302)"/>
  <rect x="320" y="190" width="10" height="4" rx="2" fill="#FFB600" opacity="0.5" transform="rotate(15 325 192)"/>
  <rect x="700" y="210" width="10" height="4" rx="2" fill="#6573FF" opacity="0.4" transform="rotate(-40 705 212)"/>
  <circle cx="240" cy="400" r="4" fill="#FFB600" opacity="0.3"/>
  <circle cx="780" cy="420" r="5" fill="#28BE46" opacity="0.3"/>
  <circle cx="300" cy="650" r="3" fill="#6573FF" opacity="0.2"/>
  <circle cx="730" cy="620" r="4" fill="#FF4460" opacity="0.2"/>

  <!-- Central shield/badge -->
  <g filter="url(#shadow1)" transform="translate(512, 400)">
    <!-- Shield shape -->
    <path d="M0,-130 L100,-95 L110,-10 Q110,80 0,130 Q-110,80 -110,-10 L-100,-95 Z" fill="url(#greenGrad)"/>
    <!-- Shield inner -->
    <path d="M0,-110 L82,-80 L90,-10 Q90,65 0,110 Q-90,65 -90,-10 L-82,-80 Z" fill="#fff" opacity="0.15"/>
    <!-- Large checkmark -->
    <polyline points="-40,5 -12,35 45,-30" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Laurel wreath left -->
  <g transform="translate(512, 420)" opacity="0.7">
    <path d="M-130,-60 Q-150,-20 -140,30 Q-130,60 -120,80" fill="none" stroke="#28BE46" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-155" cy="-30" rx="12" ry="8" fill="#28BE46" opacity="0.4" transform="rotate(-30 -155 -30)"/>
    <ellipse cx="-150" cy="0" rx="12" ry="8" fill="#28BE46" opacity="0.5" transform="rotate(-15 -150 0)"/>
    <ellipse cx="-145" cy="30" rx="12" ry="8" fill="#28BE46" opacity="0.5" transform="rotate(0 -145 30)"/>
    <ellipse cx="-135" cy="55" rx="12" ry="8" fill="#28BE46" opacity="0.4" transform="rotate(15 -135 55)"/>
  </g>

  <!-- Laurel wreath right -->
  <g transform="translate(512, 420)" opacity="0.7">
    <path d="M130,-60 Q150,-20 140,30 Q130,60 120,80" fill="none" stroke="#28BE46" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="155" cy="-30" rx="12" ry="8" fill="#28BE46" opacity="0.4" transform="rotate(30 155 -30)"/>
    <ellipse cx="150" cy="0" rx="12" ry="8" fill="#28BE46" opacity="0.5" transform="rotate(15 150 0)"/>
    <ellipse cx="145" cy="30" rx="12" ry="8" fill="#28BE46" opacity="0.5" transform="rotate(0 145 30)"/>
    <ellipse cx="135" cy="55" rx="12" ry="8" fill="#28BE46" opacity="0.4" transform="rotate(-15 135 55)"/>
  </g>

  <!-- Star above shield -->
  <g filter="url(#glow)" transform="translate(512, 235)">
    <polygon points="0,-28 8,-10 28,-8 14,6 17,26 0,16 -17,26 -14,6 -28,-8 -8,-10" fill="url(#goldGrad)"/>
  </g>

  <!-- Small stars -->
  <g transform="translate(370, 280)" opacity="0.5">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,6 -7,10 -5,2 -12,-4 -3,-4" fill="#FFB600"/>
  </g>
  <g transform="translate(660, 290)" opacity="0.5">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,6 -7,10 -5,2 -12,-4 -3,-4" fill="#FFB600"/>
  </g>

  <!-- Bottom placeholder for text -->
  <rect x="362" y="620" width="300" height="12" rx="6" fill="#1a3a2a" opacity="0.12"/>
  <rect x="412" y="644" width="200" height="8" rx="4" fill="#1a3a2a" opacity="0.06"/>
</svg>