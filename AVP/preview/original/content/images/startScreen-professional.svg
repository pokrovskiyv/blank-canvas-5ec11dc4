<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F8EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8EDD0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28BE46;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E9E38;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a2a;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="460" fill="url(#bgGrad)"/>

  <!-- Decorative dots -->
  <circle cx="180" cy="280" r="8" fill="#28BE46" opacity="0.2"/>
  <circle cx="220" cy="200" r="5" fill="#28BE46" opacity="0.15"/>
  <circle cx="830" cy="350" r="6" fill="#28BE46" opacity="0.2"/>
  <circle cx="800" cy="250" r="10" fill="#28BE46" opacity="0.12"/>
  <circle cx="160" cy="600" r="7" fill="#FFB600" opacity="0.2"/>
  <circle cx="850" cy="650" r="9" fill="#FFB600" opacity="0.15"/>

  <!-- Main clipboard -->
  <g filter="url(#shadow1)">
    <!-- Clipboard body -->
    <rect x="310" y="200" width="404" height="540" rx="20" fill="#fff"/>
    <!-- Clipboard clip -->
    <rect x="440" y="175" width="144" height="50" rx="10" fill="url(#greenGrad)"/>
    <circle cx="512" cy="200" r="12" fill="#fff"/>
  </g>

  <!-- Clipboard content lines -->
  <!-- Header area -->
  <rect x="360" y="270" width="200" height="14" rx="7" fill="#1a3a2a" opacity="0.8"/>
  <rect x="360" y="296" width="140" height="10" rx="5" fill="#999" opacity="0.4"/>

  <!-- Checklist items -->
  <!-- Item 1 - checked -->
  <g>
    <rect x="360" y="340" width="28" height="28" rx="6" fill="#28BE46"/>
    <polyline points="368,355 374,362 384,348" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="404" y="346" width="180" height="10" rx="5" fill="#333" opacity="0.6"/>
    <rect x="404" y="362" width="120" height="8" rx="4" fill="#999" opacity="0.3"/>
  </g>

  <!-- Item 2 - checked -->
  <g>
    <rect x="360" y="395" width="28" height="28" rx="6" fill="#28BE46"/>
    <polyline points="368,410 374,417 384,403" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="404" y="401" width="220" height="10" rx="5" fill="#333" opacity="0.6"/>
    <rect x="404" y="417" width="150" height="8" rx="4" fill="#999" opacity="0.3"/>
  </g>

  <!-- Item 3 - in progress -->
  <g>
    <rect x="360" y="450" width="28" height="28" rx="6" fill="#FFB600"/>
    <circle cx="374" cy="464" r="5" fill="#fff"/>
    <rect x="404" y="456" width="160" height="10" rx="5" fill="#333" opacity="0.6"/>
    <rect x="404" y="472" width="100" height="8" rx="4" fill="#999" opacity="0.3"/>
  </g>

  <!-- Item 4 - unchecked -->
  <g>
    <rect x="360" y="505" width="28" height="28" rx="6" fill="none" stroke="#ccc" stroke-width="2"/>
    <rect x="404" y="511" width="200" height="10" rx="5" fill="#333" opacity="0.3"/>
    <rect x="404" y="527" width="130" height="8" rx="4" fill="#999" opacity="0.2"/>
  </g>

  <!-- Item 5 - unchecked -->
  <g>
    <rect x="360" y="560" width="28" height="28" rx="6" fill="none" stroke="#ccc" stroke-width="2"/>
    <rect x="404" y="566" width="170" height="10" rx="5" fill="#333" opacity="0.3"/>
    <rect x="404" y="582" width="110" height="8" rx="4" fill="#999" opacity="0.2"/>
  </g>

  <!-- Progress bar at bottom -->
  <rect x="360" y="630" width="304" height="10" rx="5" fill="#E8F8EB"/>
  <rect x="360" y="630" width="140" height="10" rx="5" fill="url(#greenGrad)"/>

  <!-- Small chart card floating right -->
  <g filter="url(#shadow2)" transform="translate(640, 380)">
    <rect x="0" y="0" width="130" height="100" rx="12" fill="#fff"/>
    <!-- Mini bar chart -->
    <rect x="20" y="55" width="16" height="25" rx="3" fill="#28BE46" opacity="0.4"/>
    <rect x="42" y="40" width="16" height="40" rx="3" fill="#28BE46" opacity="0.6"/>
    <rect x="64" y="30" width="16" height="50" rx="3" fill="#28BE46" opacity="0.8"/>
    <rect x="86" y="20" width="16" height="60" rx="3" fill="#28BE46"/>
    <!-- Trend arrow -->
    <polyline points="28,50 50,38 72,28 94,18" fill="none" stroke="#1E9E38" stroke-width="2" stroke-linecap="round"/>
    <polygon points="94,14 100,20 92,20" fill="#1E9E38"/>
  </g>

  <!-- Small target/bullseye floating left -->
  <g filter="url(#shadow2)" transform="translate(130, 380)">
    <rect x="0" y="0" width="110" height="110" rx="12" fill="#fff"/>
    <circle cx="55" cy="55" r="35" fill="none" stroke="#E8F8EB" stroke-width="8"/>
    <circle cx="55" cy="55" r="24" fill="none" stroke="#28BE46" stroke-width="6" opacity="0.5"/>
    <circle cx="55" cy="55" r="12" fill="#28BE46"/>
    <!-- Arrow hitting target -->
    <line x1="75" y1="35" x2="60" y2="50" stroke="#FF4460" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="58,52 62,46 56,48" fill="#FF4460"/>
  </g>

  <!-- Floating badge top-right -->
  <g filter="url(#shadow2)" transform="translate(680, 220)">
    <circle cx="40" cy="40" r="35" fill="url(#greenGrad)"/>
    <text x="40" y="36" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="700">A+</text>
    <text x="40" y="52" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="10" opacity="0.8">score</text>
  </g>

  <!-- Coffee cup icon bottom-left (ties to business scenario) -->
  <g filter="url(#shadow2)" transform="translate(170, 580)">
    <rect x="0" y="0" width="90" height="90" rx="12" fill="#fff"/>
    <!-- Simple coffee cup -->
    <rect x="22" y="25" width="36" height="35" rx="4" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
    <path d="M58,35 Q72,35 72,47 Q72,55 58,55" fill="none" stroke="#1a3a2a" stroke-width="2.5"/>
    <rect x="18" y="63" width="44" height="5" rx="2.5" fill="#1a3a2a" opacity="0.3"/>
    <!-- Steam -->
    <path d="M32,20 Q34,14 32,8" fill="none" stroke="#28BE46" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M42,18 Q44,12 42,6" fill="none" stroke="#28BE46" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M52,20 Q54,14 52,8" fill="none" stroke="#28BE46" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>