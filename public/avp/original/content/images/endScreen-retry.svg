<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0F2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFE0E5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF4460;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28BE46;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E9E38;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="512" cy="512" r="460" fill="url(#bgGrad)"/>

  <!-- Soft decorative dots -->
  <circle cx="250" cy="300" r="5" fill="#FF4460" opacity="0.2"/>
  <circle cx="770" cy="340" r="6" fill="#28BE46" opacity="0.2"/>
  <circle cx="300" cy="650" r="4" fill="#FFB600" opacity="0.15"/>
  <circle cx="730" cy="620" r="5" fill="#6573FF" opacity="0.15"/>

  <!-- Main circular retry arrow -->
  <g filter="url(#shadow1)" transform="translate(512, 380)">
    <!-- Circle background -->
    <circle cx="0" cy="0" r="110" fill="#fff"/>

    <!-- Circular arrow path -->
    <path d="M0,-75 A75,75 0 1,1 -65,37" fill="none" stroke="url(#coralGrad)" stroke-width="12" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="-75,25 -55,45 -50,20" fill="#FF4460"/>

    <!-- Small lightbulb in center -->
    <g transform="translate(0, -5)">
      <path d="M0,-28 Q22,-28 22,0 Q22,12 10,18 L10,24 L-10,24 L-10,18 Q-22,12 -22,0 Q-22,-28 0,-28" fill="url(#greenGrad)" opacity="0.85"/>
      <rect x="-7" y="24" width="14" height="5" rx="2.5" fill="#1E9E38"/>
      <!-- Light rays -->
      <line x1="0" y1="-35" x2="0" y2="-30" stroke="#FFB600" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="28" y1="0" x2="32" y2="0" stroke="#FFB600" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-28" y1="0" x2="-32" y2="0" stroke="#FFB600" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="-20" x2="23" y2="-23" stroke="#FFB600" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-20" y1="-20" x2="-23" y2="-23" stroke="#FFB600" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Encouraging sprout/growth element -->
  <g transform="translate(370, 280)" opacity="0.7">
    <path d="M0,30 Q0,10 -15,-5 Q-5,0 0,10 Q5,0 15,-5 Q0,10 0,30" fill="#28BE46" opacity="0.6"/>
    <line x1="0" y1="30" x2="0" y2="45" stroke="#1E9E38" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(660, 300)" opacity="0.5">
    <path d="M0,20 Q0,5 -10,-5 Q-3,0 0,8 Q3,0 10,-5 Q0,5 0,20" fill="#28BE46" opacity="0.6"/>
    <line x1="0" y1="20" x2="0" y2="30" stroke="#1E9E38" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Small stars (encouraging) -->
  <g transform="translate(300, 450)" opacity="0.3">
    <polygon points="0,-10 3,-3 10,-3 4,2 6,9 0,5 -6,9 -4,2 -10,-3 -3,-3" fill="#FFB600"/>
  </g>
  <g transform="translate(720, 470)" opacity="0.25">
    <polygon points="0,-8 2,-3 8,-3 4,1 5,7 0,4 -5,7 -4,1 -8,-3 -2,-3" fill="#FFB600"/>
  </g>

  <!-- Bottom text placeholder -->
  <rect x="362" y="620" width="300" height="12" rx="6" fill="#1a3a2a" opacity="0.1"/>
  <rect x="412" y="644" width="200" height="8" rx="4" fill="#1a3a2a" opacity="0.05"/>
</svg>