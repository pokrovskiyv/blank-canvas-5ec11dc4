<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFF0C0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFB600;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28BE46;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E9E38;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="512" cy="512" r="460" fill="url(#bgGrad)"/>

  <!-- Confetti -->
  <rect x="220" y="280" width="10" height="4" rx="2" fill="#FFB600" opacity="0.4" transform="rotate(-20 225 282)"/>
  <rect x="780" y="310" width="12" height="4" rx="2" fill="#28BE46" opacity="0.3" transform="rotate(25 786 312)"/>
  <circle cx="300" cy="200" r="4" fill="#FFB600" opacity="0.3"/>
  <circle cx="730" cy="230" r="5" fill="#28BE46" opacity="0.25"/>
  <circle cx="240" cy="450" r="3" fill="#6573FF" opacity="0.2"/>
  <circle cx="780" cy="480" r="4" fill="#FF4460" opacity="0.2"/>

  <!-- Main clipboard with partial checkmarks -->
  <g filter="url(#shadow1)" transform="translate(512, 390)">
    <!-- Clipboard body -->
    <rect x="-100" y="-140" width="200" height="280" rx="16" fill="#fff"/>
    <!-- Clipboard clip -->
    <rect x="-35" y="-155" width="70" height="30" rx="8" fill="url(#goldGrad)"/>
    <circle cx="0" cy="-140" r="8" fill="#fff"/>

    <!-- Check item 1 - done -->
    <rect x="-70" y="-90" width="24" height="24" rx="5" fill="#28BE46"/>
    <polyline points="-63,-78 -58,-72 -51,-84" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-36" y="-84" width="90" height="8" rx="4" fill="#333" opacity="0.5"/>

    <!-- Check item 2 - done -->
    <rect x="-70" y="-50" width="24" height="24" rx="5" fill="#28BE46"/>
    <polyline points="-63,-38 -58,-32 -51,-44" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-36" y="-44" width="100" height="8" rx="4" fill="#333" opacity="0.5"/>

    <!-- Check item 3 - partial (yellow) -->
    <rect x="-70" y="-10" width="24" height="24" rx="5" fill="#FFB600"/>
    <text x="-58" y="9" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">~</text>
    <rect x="-36" y="-4" width="80" height="8" rx="4" fill="#333" opacity="0.35"/>

    <!-- Check item 4 - empty -->
    <rect x="-70" y="30" width="24" height="24" rx="5" fill="none" stroke="#ccc" stroke-width="2"/>
    <rect x="-36" y="36" width="95" height="8" rx="4" fill="#333" opacity="0.2"/>

    <!-- Check item 5 - empty -->
    <rect x="-70" y="70" width="24" height="24" rx="5" fill="none" stroke="#ccc" stroke-width="2"/>
    <rect x="-36" y="76" width="70" height="8" rx="4" fill="#333" opacity="0.2"/>

    <!-- Progress bar -->
    <rect x="-70" y="115" width="140" height="8" rx="4" fill="#FFF0C0"/>
    <rect x="-70" y="115" width="75" height="8" rx="4" fill="url(#goldGrad)"/>
  </g>

  <!-- Star badge (smaller than success) -->
  <g transform="translate(512, 210)" opacity="0.8">
    <polygon points="0,-22 6,-8 22,-6 10,5 13,20 0,12 -13,20 -10,5 -22,-6 -6,-8" fill="url(#goldGrad)"/>
  </g>

  <!-- "Almost there" indicator -->
  <g transform="translate(650, 290)">
    <circle cx="0" cy="0" r="32" fill="#fff" filter="url(#shadow1)"/>
    <text x="0" y="-2" text-anchor="middle" fill="#FFB600" font-family="Arial,sans-serif" font-size="15" font-weight="700">54%</text>
    <text x="0" y="12" text-anchor="middle" fill="#999" font-family="Arial,sans-serif" font-size="8">score</text>
  </g>

  <!-- Bottom text placeholder -->
  <rect x="362" y="640" width="300" height="12" rx="6" fill="#1a3a2a" opacity="0.1"/>
  <rect x="412" y="664" width="200" height="8" rx="4" fill="#1a3a2a" opacity="0.05"/>
</svg>