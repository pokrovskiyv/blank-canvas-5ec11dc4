<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F8EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D0F0D8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28BE46;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E9E38;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFB600;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="460" fill="url(#bgGrad)"/>

  <!-- Decorative confetti -->
  <rect x="200" y="250" width="12" height="4" rx="2" fill="#28BE46" opacity="0.4" transform="rotate(-30 206 252)"/>
  <rect x="300" y="180" width="10" height="4" rx="2" fill="#FFB600" opacity="0.5" transform="rotate(20 305 182)"/>
  <rect x="750" y="280" width="12" height="4" rx="2" fill="#FF4460" opacity="0.4" transform="rotate(-45 756 282)"/>
  <rect x="700" y="200" width="10" height="4" rx="2" fill="#6573FF" opacity="0.4" transform="rotate(15 705 202)"/>
  <rect x="180" y="500" width="10" height="4" rx="2" fill="#FFB600" opacity="0.3" transform="rotate(-20 185 502)"/>
  <rect x="820" y="480" width="12" height="4" rx="2" fill="#28BE46" opacity="0.3" transform="rotate(35 826 482)"/>
  <circle cx="250" cy="350" r="4" fill="#28BE46" opacity="0.3"/>
  <circle cx="770" cy="380" r="5" fill="#FFB600" opacity="0.3"/>
  <circle cx="350" cy="200" r="3" fill="#FF4460" opacity="0.3"/>
  <circle cx="680" cy="180" r="4" fill="#6573FF" opacity="0.3"/>

  <!-- Trophy -->
  <g filter="url(#shadow1)" transform="translate(512, 420)">
    <!-- Trophy cup -->
    <path d="M-80,-120 L-80,-20 Q-80,60 0,80 Q80,60 80,-20 L80,-120 Z" fill="url(#goldGrad)"/>
    <!-- Trophy shine -->
    <path d="M-60,-120 L-60,-30 Q-60,40 -10,60 L-10,-120 Z" fill="#fff" opacity="0.15"/>
    <!-- Trophy handles -->
    <path d="M-80,-80 Q-130,-80 -130,-40 Q-130,0 -80,0" fill="none" stroke="#FFB600" stroke-width="12" stroke-linecap="round"/>
    <path d="M80,-80 Q130,-80 130,-40 Q130,0 80,0" fill="none" stroke="#FFB600" stroke-width="12" stroke-linecap="round"/>
    <!-- Trophy base -->
    <rect x="-30" y="80" width="60" height="30" rx="4" fill="#E6A300"/>
    <rect x="-55" y="110" width="110" height="16" rx="8" fill="#E6A300"/>
    <rect x="-65" y="122" width="130" height="10" rx="5" fill="#D49500"/>

    <!-- Star on trophy -->
    <g filter="url(#glow)">
      <polygon points="0,-70 12,-42 42,-38 20,-16 26,14 0,0 -26,14 -20,-16 -42,-38 -12,-42" fill="#fff" opacity="0.9"/>
    </g>
  </g>

  <!-- Checkmark circle above trophy -->
  <g transform="translate(512, 230)">
    <circle cx="0" cy="0" r="55" fill="url(#greenGrad)" filter="url(#shadow1)"/>
    <polyline points="-22,2 -8,18 24,-12" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- "100%" badge -->
  <g transform="translate(680, 300)">
    <circle cx="0" cy="0" r="38" fill="#fff" filter="url(#shadow1)"/>
    <text x="0" y="-4" text-anchor="middle" fill="#28BE46" font-family="Arial,sans-serif" font-size="18" font-weight="700">100%</text>
    <text x="0" y="14" text-anchor="middle" fill="#999" font-family="Arial,sans-serif" font-size="10">done</text>
  </g>

  <!-- Stars floating -->
  <g transform="translate(300, 310)" opacity="0.6">
    <polygon points="0,-18 5,-6 18,-6 8,3 11,16 0,9 -11,16 -8,3 -18,-6 -5,-6" fill="#FFB600"/>
  </g>
  <g transform="translate(720, 450)" opacity="0.4">
    <polygon points="0,-14 4,-5 14,-5 6,2 9,12 0,7 -9,12 -6,2 -14,-5 -4,-5" fill="#FFB600"/>
  </g>
  <g transform="translate(260, 520)" opacity="0.3">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,6 -7,10 -5,2 -12,-4 -3,-4" fill="#FFB600"/>
  </g>

  <!-- Bottom text area -->
  <rect x="362" y="620" width="300" height="12" rx="6" fill="#1a3a2a" opacity="0.15"/>
  <rect x="412" y="644" width="200" height="8" rx="4" fill="#1a3a2a" opacity="0.08"/>
</svg>